{% extends 'base.html' %}
{% block title %}Login — Expense Tracker{% endblock %}

{% block content %}
<!-- ============================================================
     LOGIN PAGE
     Existing users sign in here.
============================================================ -->

<div class="auth-wrapper">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-sm-10 col-md-7 col-lg-5">

        <div class="card auth-card">
          <div class="card-body p-4 p-md-5">

            <!-- Header -->
            <div class="text-center mb-4">
              <div class="auth-logo mb-2">💰</div>
              <h2 class="fw-bold" style="color: #4f46e5;">Welcome Back</h2>
              <p class="text-muted">Sign in to your ExpenseTracker account</p>
            </div>

            <!-- Login Form -->
            <form method="POST" novalidate>
              {% csrf_token %}

              <!-- Username -->
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-person text-muted"></i>
                  </span>
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control border-start-0"
                    placeholder="Enter your username"
                    required
                    autofocus
                  />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-4">
                <label for="password" class="form-label">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0">
                    <i class="bi bi-lock text-muted"></i>
                  </span>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control border-start-0"
                    placeholder="Enter your password"
                    required
                  />
                </div>
              </div>

              <!-- Submit Button -->
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                </button>
              </div>

            </form>

            <!-- Link to Register -->
            <hr />
            <p class="text-center text-muted mb-0">
              Don't have an account?
              <a href="{% url 'register' %}" class="fw-semibold">Create one free</a>
            </p>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>

{% endblock %}
